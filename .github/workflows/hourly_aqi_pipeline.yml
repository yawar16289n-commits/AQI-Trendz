name: Hourly AQI End-to-End Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour at minute 0
  workflow_dispatch: # Allows manual triggering from the GitHub UI

env:
  HOPSWORKS_API_KEY: ${{ secrets.HOPSWORKS_API_KEY }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Latest Historical Data
        run: python scripts/data_prep/fetch_data.py

      - name: Engineer Features
        run: python scripts/data_prep/feature_engineering.py

      - name: Upload to Hopsworks Feature Store
        run: python scripts/pipelines/feature_pipeline.py

      - name: Retrain Baseline Model
        run: python scripts/pipelines/training_pipeline.py

      - name: Predict Next 3 Days (Forecast)
        run: python scripts/pipelines/predict_pipeline.py

      - name: Commit Updated Models and History
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add models/
          git add data/cleaned/predictions.csv
          git commit -m "Auto-update: Hourly Retrain & Forecast [skip ci]" || echo "No changes to commit"
          git push
